name: Deploy to DreamHost

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to DreamHost via SFTP
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /home/${{ secrets.DREAMHOST_USERNAME }}/gringots.sebastianruiz.online/
          remote_host: ${{ secrets.DREAMHOST_HOST }}
          remote_user: ${{ secrets.DREAMHOST_USERNAME }}
          remote_key: ${{ secrets.DREAMHOST_SSH_KEY }}
          remote_key_pass: ${{ secrets.DREAMHOST_SSH_PASSPHRASE }}

      - name: Deployment Success
        run: echo "Deployed to gringots.sebastianruiz.online successfully"
